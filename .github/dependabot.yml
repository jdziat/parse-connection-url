version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    # Group dev dependencies together to reduce PR noise
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
    # Ignore major version updates for now (review manually)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
